name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: casc-extractor.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: casc-extractor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p casc-cli
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          $archive = "casc-extractor-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          archive="casc-extractor-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$archive" -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: casc-extractor-*

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish casc-lib
        run: cargo publish -p casc-lib --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish casc-cli
        run: cargo publish -p casc-cli --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
